################
### MONITORS ###
################

exec-once = xrandr --output HDMI-A-1 --primary
monitor = HDMI-A-1,1920x1080,0x0, 1
monitor = eDP-1, 1920x1200, 0x1080, 1


###################
### MY PROGRAMS ###
###################

$terminal = kitty
# $fileManager = kitty --session yazi_session
$fileManager = pgrep nautilus >/dev/null 2>&1 && killall nautilus && nautilus
$browser = zen-browser
# $menu = pgrep wofi >/dev/null 2>&1 && killall wofi || wofi --show drun
$menu = pgrep rofi >/dev/null 2>&1 && killall rofi || ~/.config/rofi/scripts/launcher_t1

#################
### KEYBINDS ####
#################

source = ~/.config/hypr/binds.conf


#################
### AUTOSTART ###
#################

exec-once = [workspace 1 silent] $terminal
exec-once = [workspace 2 silent] $browser
exec-once = [workspace 3 silent] nautilus
exec-once = [workspace 4 silent] /opt/teams-for-linux/teams-for-linux
exec-once = [workspace 7 silent] postman

exec-once = nm-applet
exec-once = blueman-applet
exec-once = hyprpaper
exec-once = ~/.config/waybar/launch.sh
exec-once = /usr/lib/xfce4/notifyd/xfce4-notifyd
exec-once = /usr/lib/xfce-polkit/xfce-polkit
exec-once = hyprctl setcursor macOS 28
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = ~/.config/hypr/scripts/startup.sh
exec-once = wl-paste --watch cliphist store
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'WhiteSur-Dark'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = /usr/lib/evolution-data-server/evolution-alarm-notify

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = ADW_DISABLE_PORTAL,1
env = XCURSOR_SIZE,28
env = HYPRCURSOR_SIZE,28
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORM,wayland;xcb 
env = MOZ_ENABLE_WAYLAND,1
env = EDITOR,nvim


#####################
### LOOK AND FEEL ###
#####################

general { 
    gaps_in = 5
    gaps_out = 10

    border_size = 2

    col.active_border = rgba(0a9cf5ee)
    col.inactive_border = rgba(595959aa)

    resize_on_border = true 

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 10

    active_opacity = 1.0
    inactive_opacity = 1.0

    blur {
        enabled = false
    }
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

misc { 
    force_default_wallpaper = 0
    disable_hyprland_logo = true 
    disable_splash_rendering = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

cursor {
    no_hardware_cursors = true
}

xwayland {
  force_zero_scaling = true
}

##############################
### WINDOWS AND WORKSPACES ###
##############################

workspace = 1, monitor:HDMI-A-1
workspace = 2, monitor:eDP-1 
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1

windowrule = match:class .*, suppress_event maximize 

windowrule = move 10 60, match:class xfce4-notifyd
windowrule = move 781 51, match:class org.gnome.Calendar
windowrule = move 1472 53, match:class com.waybar.notif-center
windowrule = move (cursor_x-(window_w*0.5)) (cursor_y-(window_h*-0.06)), match:class galendae 
windowrule = move (cursor_x-(window_w*0.58)) (cursor_y-(window_h*-0.06)), match:class audio-switcher 

windowrule = monitor 1, match:class xfce4-notifyd

windowrule = match:class xfce4-notifyd, no_initial_focus on

windowrule = match:class ^(blueman-manager)(.*)$, float on
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(nwg-look)$, float on
windowrule = match:class ^(qt6ct)$, float on
windowrule = match:class ^(Emulator)$, float on
windowrule = match:class ^(kvantummanager)$, float on
windowrule = match:class ^(scrcpy)$, float on
windowrule = match:class ^(xfce-polkit)$, float on
windowrule = match:class ^(org.gnome.gedit)$, float on
windowrule = match:class (thunar), match:title (File Operation Progress), float on
windowrule = match:class (zen), match:title (Sign in - Google Accounts — Zen Browser), float on
windowrule = match:class (google-chrome), match:title (Untitled - Google Chrome), float on
windowrule = match:class ^(com.cisco.anyconnect.gui)$, float on
windowrule = match:class ^(thunar)$, match:title (Rename)(.*), float on
windowrule = match:class ^(brave)$, match:title .*wants to open.*, float on
windowrule = match:class ^(zen)$, match:initial_title .*Zen Browser.*, match:title .*Sign in - Google Accounts.*, float on, size 600 800
windowrule = match:class ^(org.gnome.Calendar)$, float on, size 360 600
windowrule = match:class ^(notif-center)$, float on

windowrule = match:class (Code), center on
windowrule = match:class (obsidian), center on
windowrule = match:class (Docker Desktop), center on
windowrule = match:class (org.gnome.gedit), center on
windowrule = match:class (Brave), center on
windowrule = match:class (brave-browser), center on
windowrule = match:class (brave), center on
windowrule = match:class (zen), center on
windowrule = match:class (google-chrome), match:title (Save File), center on
windowrule = match:class (google-chrome), match:title (Untitled - Google Chrome), center on
windowrule = match:class (file-roller), match:title (Extract), center on
windowrule = match:class (Electron), match:title (Location) , center on
windowrule = match:class ^(com.cisco.anyconnect.gui)$, center on
windowrule = match:class ^(thunar)$, match:title (Rename)(.*), center on

windowrule = match:class ^(kitty)$, workspace 1
windowrule = match:class ^(org.wezfurlong.wezterm)$, workspace 1 
windowrule = match:class ^(brave-browser)$, workspace 2 
windowrule = match:class ^(google-chrome)$, workspace 2 
windowrule = match:class ^(thunar)$, workspace 3 
windowrule = match:class ^(org.gnome.Nautilus)$, workspace 3 
windowrule = match:class ^(teams-for-linux)$, workspace 4 
windowrule = match:class ^(outlook-for-linux)$, workspace 5 
windowrule = match:class ^(MongoDB Compass)$, workspace 6 
windowrule = match:class ^(DBeaver)$, workspace 6 
windowrule = match:class ^(DbVisualizer)$, workspace 6 
windowrule = match:class ^(Postman)$, workspace 7 
windowrule = match:class ^(Insomnia)$, workspace 7 
windowrule = match:class ^(mpv)$, workspace 8 
windowrule = match:class ^(Spotify)$, workspace 9 
windowrule = match:class ^(com.cisco.anyconnect.gui)$, workspace 10 
